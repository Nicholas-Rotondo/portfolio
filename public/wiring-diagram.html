ot Pi)',{fill:'#374151','font-size':'8px','text-anchor':'middle','font-family':'Courier New'}));\n  const usbPos={x:USB.x+30,y:USB.y+USB.h-18};\n  const usbNeg={x:USB.x+60,y:USB.y+USB.h-18};\n  usbG.appendChild(circ(usbPos.x,usbPos.y,4,{fill:RED,stroke:'#fff','stroke-width':.8,'data-label':'USB Charger + → Relay K1 COM'}));\n  usbG.appendChild(circ(usbNeg.x,usbNeg.y,4,{fill:'#374151',stroke:'#6b7280','stroke-width':1,'data-label':'USB Charger − → Relay GND'}));\n  usbG.appendChild(text(usbPos.x,usbPos.y+14,'+',{fill:RED,'font-size':'9px','text-anchor':'middle','font-family':'Courier New','font-weight':'bold'}));\n  usbG.appendChild(text(usbNeg.x,usbNeg.y+14,'−',{fill:GRAY,'font-size':'9px','text-anchor':'middle','font-family':'Courier New'}));\n\n  // charger + → K1 COM\n  svg.appendChild(bezier(usbPos.x,usbPos.y,K1pins.COM.x,K1pins.COM.y,RED,false,2));\n  // charger − → relay GND\n  svg.appendChild(bezier(usbNeg.x,usbNeg.y,rlyPins.GND.x,rlyPins.GND.y,GRAY,false,1.8));\n  // pump − → relay GND\n  svg.appendChild(bezier(pmpNeg.x,pmpNeg.y,rlyPins.GND.x,rlyPins.GND.y,GRAY,true,1.8));\n\n  /* ── FLOAT SWITCH ── */\n  const FS={x:EX,y:450,w:200,h:80};\n  const fsG=g(); svg.appendChild(fsG);\n  fsG.appendChild(rect(FS.x,FS.y,FS.w,FS.h,{fill:'#1c1917',rx:4,stroke:GRAY,'stroke-width':1.2}));\n  fsG.appendChild(text(FS.x+FS.w/2,FS.y-10,'FLOAT SWITCH',{fill:GRAY,'font-size':'9px','text-anchor':'middle','font-family':'Courier New','font-weight':'bold'}));\n  fsG.appendChild(text(FS.x+FS.w/2,FS.y+26,'Normally Open',{fill:'#6b7280','font-size':'9px','text-anchor':'middle','font-family':'Courier New'}));\n  fsG.appendChild(text(FS.x+FS.w/2,FS.y+42,'LOW=water · HIGH=empty',{fill:'#374151','font-size':'8px','text-anchor':'middle','font-family':'Courier New'}));\n  const fsSig={x:FS.x+30,y:FS.y+FS.h-14};\n  fsG.appendChild(circ(fsSig.x,fsSig.y,4,{fill:GRAY,stroke:'#fff','stroke-width':.8,'data-label':'Float Switch signal → Pi GPIO17'}));\n  fsG.appendChild(text(fsSig.x,fsSig.y+14,'SIG',{fill:GRAY,'font-size':'7.5px','text-anchor':'middle','font-family':'Courier New'}));\n\n  /* ── MOISTURE SENSORS ×4 ── */\n  const SENSORS=[\n    {name:'German Chamomile',ch:'A0',color:S0, sigWire:'Grey', vcWire:'Purple',gdWire:'White', sigRow:15,sigCol:'d',vccRow:12,gndRow:13,y:580},\n    {name:'Peppermint',      ch:'A1',color:S1, sigWire:'Red',  vcWire:'Green', gdWire:'Yellow',sigRow:17,sigCol:'d',vccRow:13,gndRow:12,y:700},\n    {name:'English Lavender',ch:'A2',color:S2, sigWire:'Yellow',vcWire:'Orange',gdWire:'Grey', sigRow:18,sigCol:'d',vccRow:20,gndRow:20,y:820},\n    {name:'Borage',          ch:'A3',color:S3, sigWire:'Green',vcWire:'Purple',gdWire:'Blue',  sigRow:19,sigCol:'d',vccRow:24,gndRow:24,y:940},\n  ];\n\n  for(const s of SENSORS){\n    const SX={x:EX,y:s.y,w:300,h:72};\n    const sensG=g(); svg.appendChild(sensG);\n    sensG.appendChild(rect(SX.x,SX.y,SX.w,SX.h,{fill:'#1c1917',rx:4,stroke:s.color,'stroke-width':1.6}));\n    sensG.appendChild(text(SX.x+SX.w/2,SX.y+22,s.name,{fill:s.color,'font-size':'10px','text-anchor':'middle','font-family':'Courier New','font-weight':'bold'}));\n    sensG.appendChild(text(SX.x+SX.w/2,SX.y+36,`Capacitive Soil Moisture  ·  ${s.ch}`,{fill:'#57534e','font-size':'8px','text-anchor':'middle','font-family':'Courier New'}));\n    sensG.appendChild(text(SX.x+SX.w/2,SX.y+50,`VCC:${s.vcWire}  GND:${s.gdWire}  AOUT:${s.sigWire}`,{fill:'#44403c','font-size':'7.5px','text-anchor':'middle','font-family':'Courier New'}));\n\n    // sensor output pin marker\n    const sigP={x:SX.x+20,y:SX.y+SX.h-10};\n    sensG.appendChild(circ(sigP.x,sigP.y,4,{fill:s.color,stroke:'#fff','stroke-width':.8,'data-label':`${s.name} AOUT → ADS1115 ${s.ch}`}));\n\n    // AOUT wire: sensor → breadboard hole\n    const bbSig=hXY(s.sigRow,s.sigCol);\n    // highlight the target hole on breadboard\n    bbG.appendChild(circ(bbSig.x,bbSig.y,4,{fill:s.color,stroke:'#fff','stroke-width':.8,'data-label':`ADS1115 ${s.ch} · row ${s.sigRow}`}));\n    bbG.appendChild(text(bbSig.x+8,bbSig.y-6,`${s.ch} r${s.sigRow}`,{fill:s.color,'font-size':'6.5px','font-family':'Courier New'}));\n    // wire from sensor to breadboard\n    svg.appendChild(bezier(sigP.x,sigP.y,bbSig.x,bbSig.y,s.color,false,2));\n\n    // VCC dot on breadboard rail\n    const vH=hXY(s.vccRow,'pL+');\n    const gH=hXY(s.gndRow,'pL-');\n    bbG.appendChild(circ(vH.x,vH.y,3.5,{fill:RED,stroke:'#fff','stroke-width':.5,'data-label':`Sensor VCC rail row ${s.vccRow}`}));\n    bbG.appendChild(circ(gH.x,gH.y,3.5,{fill:BLUE,stroke:'#fff','stroke-width':.5,'data-label':`Sensor GND rail row ${s.gndRow}`}));\n  }\n\n  /* ═══════════════════════════════════════\n     WIRES: Pi → Breadboard\n  ═══════════════════════════════════════ */\n  const rPlusX=BBX+PX+CX['pL+'], rMinusX=BBX+PX+CX['pL-'];\n\n  function drawWire(pinNum,tx,ty,color,dashed){\n    const from=pinXY[pinNum]; if(!from)return;\n    wiresG.appendChild(bezier(from.x,from.y,tx,ty,color,dashed));\n    wiresG.appendChild(circ(from.x,from.y,3.5,{fill:color,opacity:.92}));\n    wiresG.appendChild(circ(tx,ty,3.5,{fill:color,opacity:.92}));\n  }\n\n  // Pi → Breadboard\n  drawWire(1, rPlusX,  BBY+PY+2*RHB,  RED,    false);\n  drawWire(9, rMinusX, BBY+PY+4*RHB,  BLUE,   false);\n  drawWire(3, adsPin.SDA.x, adsPin.SDA.y, BROWN,  false);\n  drawWire(5, adsPin.SCL.x, adsPin.SCL.y, ORANGE, false);\n\n  /* ═══════════════════════════════════════\n     WIRES: Pi → Relay\n  ═══════════════════════════════════════ */\n  function piToRelay(pinNum,tgt,color,dashed){\n    const from=pinXY[pinNum]; if(!from)return;\n    svg.appendChild(bezier(from.x,from.y,tgt.x,tgt.y,color,dashed,2.4));\n    svg.appendChild(circ(from.x,from.y,3.5,{fill:color,opacity:.92}));\n    svg.appendChild(circ(tgt.x,tgt.y,3.5,{fill:color,opacity:.92}));\n  }\n\n  piToRelay(2,  rlyPins.VCC, GRAY,       false);\n  piToRelay(6,  rlyPins.GND, DARKPURPLE, false);\n  piToRelay(13, rlyPins.IN1, ORANGE,     false);\n  piToRelay(11, fsSig,       GRAY,       true);\n\n  /* ── zone labels ── */\n  for(const[lx,ly,lbl]of[\n    [PI.x+PI.w/2, PI.y+PI.h+16, 'RASPBERRY PI'],\n    [BBX+BB_W/2,  BBY+BB_H+16,  'BREADBOARD'],\n    [EX+150,      40,            'EXTERNAL COMPONENTS'],\n  ]){\n    svg.appendChild(text(lx,ly,lbl,{fill:'#374151','font-size':'8px','text-anchor':'middle','font-family':'Courier New','letter-spacing':'.2em'}));\n  }\n\n  /* ── zone dividers ── */\n  const divY0=30, divY1=990;\n  for(const dx of[PI.x+PI.w+12, BBX+BB_W+12]){\n    svg.appendChild(line(dx,divY0,dx,divY1,{stroke:'#1f2937','stroke-width':1,'stroke-dasharray':'4,6'}));\n  }\n\n  /* ── tooltips ── */\n  svg.addEventListener('mousemove',e=>{\n    const lbl=e.target.getAttribute('data-label');\n    if(lbl){\n      tip.textContent=lbl; tip.style.display='block';\n      tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY-6)+'px';\n    } else { tip.style.display='none'; }\n  });\n  svg.addEventListener('mouseleave',()=>{tip.style.display='none';});\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
